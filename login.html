<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sign In | VMK Networks</title>

<link rel="stylesheet" href="css/login.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>


<body>

<!-- VIDEO BACKGROUND -->

<video autoplay muted loop class="video-bg">
<source src="video/background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>


<div class="login-card">

<i class="fa fa-user-circle icon"></i>

<h2>Sign In</h2>

<p>Please enter your details to sign in.</p>


<!-- LOGIN FORM -->

<form id="loginForm">

<input type="email" placeholder="Enter your email address">

<div class="password-box">

<input type="password" id="password" placeholder="Password">

<i class="fa fa-eye" onclick="togglePassword()"></i>

</div>

<button class="btn">Sign In</button>

</form>


<div class="divider">OR</div>


<button class="admin-btn">
Admin Login
</button>


<p class="signup">

Don't have an account?

<a onclick="showRegister()">Sign up</a>

</p>

</div>



<!-- REGISTER CARD -->

<div class="register-card" id="registerCard">

<h2>Create Account</h2>


<form>

<div class="row">

<input placeholder="First Name">

<input placeholder="Last Name">

</div>

<input placeholder="Email">

<input placeholder="Phone">

<input placeholder="Address (Optional)">

<input placeholder="Pin Code">


<div class="password-box">

<input type="password" id="regPassword" placeholder="Password">

<i class="fa fa-eye" onclick="toggleRegPassword()"></i>

</div>

<input type="password" placeholder="Confirm Password">


<button class="btn">Register</button>

</form>


<p class="signup">

Already have an account?

<a onclick="showLogin()">Sign In</a>

</p>

</div>


<script src="js/login.js"></script>

</body>
</html>
